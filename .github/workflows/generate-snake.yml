name: Generate Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from GitHub contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: lynnhr
          outputs: |
            ./github-contribution-grid-snake.svg
          color_snake: "#2E77B3"                # A visually appealing blue snake
          color_dots: "#161B22,#3fb950,#39d353,#b3fcae,#fff"   # Nice green/white dots for contrast
          background: "#0D1117"                 # Classic GitHub dark mode background
      - name: Push snake game to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
